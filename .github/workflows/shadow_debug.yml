name: Shadow Debug (temporary)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Call ArShadow.record directly in VM
        env:
          SHADOW_ENDPOINT: ${{ secrets.SHADOW_ENDPOINT }}
          SHADOW_TOKEN: ${{ secrets.SHADOW_TOKEN }}
        run: |
          cat > /tmp/probe.js <<'EOF'
          const loadVm = require(process.env.GITHUB_WORKSPACE + '/shadow/vm_loader');
          const vm = require('vm');
          (async () => {
            const ep = process.env.SHADOW_ENDPOINT;
            const body = JSON.stringify({ token: 'WRONG', kind: 'probe' });
            async function timed(name, fn) {
              const t0 = Date.now();
              try {
                const r = await Promise.race([fn(), new Promise((_, rej) => setTimeout(() => rej(new Error('TIMEOUT 15s')), 15000))]);
                let txt = '';
                try { txt = (await r.text()).slice(0, 60); } catch (e) { txt = '(text fail)'; }
                console.log(`[${name}] settled ${Date.now() - t0}ms status=${r.status} body=${txt}`);
              } catch (e) {
                console.log(`[${name}] FAILED ${Date.now() - t0}ms: ${e.message}`);
              }
            }
            await timed('node-plain', () => fetch(ep, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body }));
            await timed('node-nocors', () => fetch(ep, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body }));
            const vmEnv = await loadVm();
            const mk = (opts) => vm.runInContext(`fetch(${JSON.stringify(JSON.stringify(ep))} && ${JSON.stringify(ep)} ? ${JSON.stringify(ep)} : '', ${opts})`, vmEnv.context);
            await timed('vm-plain', () => vm.runInContext(`fetch('${ep}', { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: '${body.replace(/'/g, "\\'")}' })`, vmEnv.context));
            await timed('vm-nocors', () => vm.runInContext(`fetch('${ep}', { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: '${body.replace(/'/g, "\\'")}' })`, vmEnv.context));
            console.log('--- done ---');
          })().catch(e => { console.error('probe failed:', e); process.exit(1); });

          EOF
          node /tmp/probe.js
