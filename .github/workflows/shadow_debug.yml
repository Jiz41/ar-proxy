name: Shadow Debug (temporary)

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Call ArShadow.record directly in VM
        env:
          SHADOW_ENDPOINT: ${{ secrets.SHADOW_ENDPOINT }}
          SHADOW_TOKEN: ${{ secrets.SHADOW_TOKEN }}
        run: |
          cat > /tmp/probe.js <<'EOF'
          const loadVm = require('./shadow/vm_loader');
          (async () => {
            console.log('env endpoint set:', !!process.env.SHADOW_ENDPOINT, 'token set:', !!process.env.SHADOW_TOKEN);
            const vmEnv = await loadVm();
            const { ArShadow, window } = vmEnv;
            console.log('record typeof:', typeof ArShadow.record);
            const ctx = {
              players: [{ carNum: 1, totalScore: 1, winRate: 0 }],
              meta: { date: '20260705', venue: 'probe2', raceNo: 0, laps: '' },
              roadCondition: 'good',
              volatility: {},
              bets: {},
            };
            console.log('--- calling record ---');
            ArShadow.record(ctx);
            console.log('--- record returned, waiting 10s for fetch to settle ---');
            await new Promise(r => setTimeout(r, 10000));
            console.log('--- done ---');
          })().catch(e => { console.error('probe failed:', e); process.exit(1); });
          EOF
          node /tmp/probe.js
